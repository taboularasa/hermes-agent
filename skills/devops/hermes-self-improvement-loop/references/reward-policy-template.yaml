epoch:
  name: "Client Revenue and Social Proof"
  objective: >
    Help Hadto win client contracts, maintain revenue continuity,
    and build visible social proof through delivery quality.
  review_question: >
    Does this work increase the probability that Hadto wins or
    retains business in the current epoch?

lanes:
  maintenance:
    description: "Restore or protect operational reliability."
    default_budget_percent: 30
  growth:
    description: "Increase contract-winning throughput or social proof."
    default_budget_percent: 50
  capability:
    description: "Build Hermes abilities that clearly compound maintenance or growth."
    default_budget_percent: 20

reliability_floor_triggers:
  - "required CI on main is red"
  - "Slack, Linear, ctx, or local Codex delegation is broken"
  - "a production automation or scheduled workflow is stalled"
  - "a client-facing delivery path is broken"
  - "evidence sources are stale or contradictory"

scoring:
  scale: "0-3 coarse ratings are sufficient"
  formula: "5*epoch_impact + 3*reliability_impact + 2*reuse + 2*urgency + 1*confidence - 3*risk - 2*effort"
  fields:
    epoch_impact: "Effect on contract wins, revenue continuity, or social proof"
    reliability_impact: "Effect on breakage reduction and operator toil"
    reuse: "How often the result should pay off again"
    urgency: "How immediate the pain or opportunity is"
    confidence: "How strong the evidence is that this work will help"
    risk: "Chance of distraction or regressions"
    effort: "Expected implementation cost"

guardrails:
  max_active_issues_per_lane: 1
  max_active_projects: 1
  capability_budget_percent: 20
  capability_requires_healthy_lanes:
    - maintenance
    - growth
  require_evidence_sources: true
  require_verification_expectation: true

evidence_sources:
  - journal_entries
  - codex_runs
  - ctx_bindings
  - ontology_intelligence
  - ontology_source_materials
  - ci_and_logs
  - linear_history
  - slack_or_client_signals
