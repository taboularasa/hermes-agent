display_information:
  name: Hermes Agent
  description: Hermes AI Agent on Lenovo Home Server
features:
  bot_user:
    display_name: Hermes
    always_online: true
  slash_commands:
    - command: /hermes
      description: Send a message to Hermes Agent
      usage_hint: "[your message]"
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - reactions:read
      - reactions:write
      - users:read
settings:
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
